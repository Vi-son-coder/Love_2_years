<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <title>3D Universe Optimized</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle, #2d004d 0%, #000000 70%);
        height: 100vh;
      }
      canvas {
        display: block;
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          rgba(255, 105, 180, 0.3),
          rgba(0, 0, 0, 0.9)
        );
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        cursor: pointer;
        transition: opacity 0.8s ease;
      }

      #overlay h1 {
        color: #ffffff;
        font-family: "Segoe UI", sans-serif;
        /* Chữ nhỏ hơn và tự co giãn */
        font-size: clamp(1.2rem, 5vw, 2rem);
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 2px;

        /* Thu nhỏ khung và đảm bảo nó luôn ở giữa */
        max-width: 80%;
        padding: 15px 25px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
        margin: 0;

        animation: pulse 2s infinite alternate;
      }

      @keyframes pulse {
        from {
          transform: scale(1);
          opacity: 0.8;
        }
        to {
          transform: scale(1.03);
          opacity: 1;
        }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  </head>
  <body>
    <div id="overlay"><h1>CHẠM ĐỂ BẮT ĐẦU</h1></div>
    <audio id="bg-music" loop>
      <source src="/china.mp3" type="audio/mpeg" />
    </audio>
    <script>
      const music = document.getElementById("bg-music");
      const overlay = document.getElementById("overlay");
      let isStarted = false;

      function startAll() {
        if (isStarted) return;
        isStarted = true;

        // Phát nhạc ngay ở âm lượng tối đa
        music.volume = 1;
        music.play();

        // Ẩn lớp phủ ngay
        overlay.style.opacity = "0";
        setTimeout(() => (overlay.style.display = "none"), 800);
      }

      document.addEventListener("click", startAll, { once: true });
      // --- CẤU HÌNH ---
      const myImages = [
        "src/assets/DBJZ9625.WebP",
        "src/assets/IMG_0983.WebP",
        "src/assets/IMG_1198.WebP",
        "src/assets/IMG_1199.WebP",
        "src/assets/IMG_1319.WebP",
        "src/assets/IMG_1323.WebP",
        "src/assets/IMG_1325.WebP",
        "src/assets/IMG_1335.WebP",
        "src/assets/RYLE4532.WebP",
      ];
      const myTexts = [
        "Anh yêu em",
        "Em là cả thế giới",
        "Yêu em nhất",
        "Mãi bên nhau",
      ];
      const emojis = ["❤️", "🌸", "🌹", "💖"];

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000,
      );
      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true,
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      camera.position.z = 40;

      const starGeometry = new THREE.BufferGeometry();
      const starMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.1,
      });
      const starVertices = [];
      for (let i = 0; i < 2000; i++) {
        starVertices.push(
          THREE.MathUtils.randFloatSpread(200),
          THREE.MathUtils.randFloatSpread(200),
          THREE.MathUtils.randFloatSpread(200),
        );
      }
      starGeometry.setAttribute(
        "position",
        new THREE.Float32BufferAttribute(starVertices, 3),
      );
      const stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);

      const group = new THREE.Group();
      scene.add(group);

      const manager = new THREE.LoadingManager();
      let isLoaded = false;
      manager.onLoad = () => {
        isLoaded = true;
      };
      const loader = new THREE.TextureLoader(manager);
      const textures = myImages.map((url) => loader.load(url));

      const particles = [];
      const count = 400;
      const maxRadius = 20;
      const textGeo = new THREE.PlaneGeometry(4, 2);
      const imgGeo = new THREE.PlaneGeometry(1.2, 1.2);
      const emojiGeo = new THREE.PlaneGeometry(3.5, 1.5);

      function createTextTexture(text) {
        const canvas = document.createElement("canvas");
        canvas.width = 1024;
        canvas.height = 256;
        const ctx = canvas.getContext("2d");
        ctx.font = "bold 100px Arial";
        ctx.fillStyle = "#ff69b4";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, 512, 128);
        return new THREE.CanvasTexture(canvas);
      }

      for (let i = 0; i < count; i++) {
        let material, geometry;
        if (i < 10) {
          material = new THREE.MeshBasicMaterial({
            map: createTextTexture(myTexts[i % myTexts.length]),
            transparent: true,
            opacity: 0.8,
            alphaTest: 0.1,
            side: THREE.DoubleSide,
          });
          geometry = textGeo;
        } else if (i < 300) {
          material = new THREE.MeshBasicMaterial({
            map: textures[i % textures.length],
            transparent: true,
            opacity: 0.8,
            alphaTest: 0.1,
            side: THREE.DoubleSide,
          });
          geometry = imgGeo;
        } else {
          material = new THREE.MeshBasicMaterial({
            map: createTextTexture(emojis[i % emojis.length]),
            transparent: true,
            opacity: 0.8,
            alphaTest: 0.1,
            side: THREE.DoubleSide,
          });
          geometry = emojiGeo;
        }
        const mesh = new THREE.Mesh(geometry, material);
        const r = maxRadius * Math.pow(Math.random(), 1 / 3);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        mesh.userData.target = new THREE.Vector3(
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.sin(phi) * Math.sin(theta),
          r * Math.cos(phi),
        );
        mesh.position.set(0, 0, 0);
        group.add(mesh);
        particles.push(mesh);
      }

      const startTime = Date.now();
      function animate() {
        requestAnimationFrame(animate);
        if (isStarted) {
          group.rotation.y += 0.0008;
          stars.rotation.y -= 0.0005;
          if (isLoaded) {
            const timeElapsed = Date.now() - startTime;
            if (timeElapsed > 300) {
              particles.forEach((p) => {
                p.position.lerp(p.userData.target, 0.05);
                p.lookAt(camera.position);
              });
              if (camera.position.z > 25) camera.position.z -= 0.4;
            }
          }
        }
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
