<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <title>3D Universe Optimized</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle, #2d004d 0%, #000000 70%);
        height: 100vh;
      }
      canvas {
        display: block;
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          rgba(255, 105, 180, 0.3),
          rgba(0, 0, 0, 0.9)
        );
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        cursor: pointer;
        transition: opacity 0.8s ease;
        pointer-events: auto;
      }

      #overlay h1 {
        color: #ffffff;
        font-family: "Segoe UI", sans-serif;
        /* Chữ nhỏ hơn và tự co giãn */
        font-size: clamp(1.2rem, 5vw, 2rem);
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 2px;

        /* Thu nhỏ khung và đảm bảo nó luôn ở giữa */
        max-width: 80%;
        padding: 15px 25px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
        margin: 0;

        animation: pulse 2s infinite alternate;
      }

      @keyframes pulse {
        from {
          transform: scale(1);
          opacity: 0.8;
        }
        to {
          transform: scale(1.03);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="overlay"><h1>CHẠM ĐỂ BẮT ĐẦU</h1></div>
    <audio id="bg-music" loop>
      <source src="/china.mp3" type="audio/mpeg" />
    </audio>

    <script type="module" src="/src/universe.js"></script>
  </body>
</html>
