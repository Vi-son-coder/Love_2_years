<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Giao diện PIN Cute</title>
    <style>
      /* Reset chuẩn để tính toán kích thước chính xác không bị tràn */
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent; /* Xóa vệt màu xanh khi chạm nút trên điện thoại */
      }

      body {
        background-color: #ffdce6;
        background-image: linear-gradient(
            45deg,
            #ffcce0 25%,
            transparent 25%,
            transparent 75%,
            #ffcce0 75%,
            #ffcce0
          ),
          linear-gradient(
            45deg,
            #ffcce0 25%,
            transparent 25%,
            transparent 75%,
            #ffcce0 75%,
            #ffcce0
          );
        background-position:
          0 0,
          20px 20px;
        background-size: 40px 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh; /* Dùng min-height thay vì height để không bị lỗi trên Safari mobile */
        margin: 0;
        padding: 20px; /* Tạo khoảng cách an toàn với viền màn hình */
        font-family: "Arial", sans-serif;
      }

      .card {
        background-color: rgba(255, 255, 255, 0.5);
        padding: 25px 20px;
        border-radius: 35px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        text-align: center;
        width: 100%;
        max-width: 320px; /* Co giãn mượt mà từ màn hình siêu nhỏ đến tối đa 320px */
        display: flex;
        flex-direction: column;
        align-items: center;
        backdrop-filter: blur(10px);
        border: 2px solid rgba(255, 255, 255, 0.3);
      }

      .avatar {
        width: 95px;
        height: 135px; /* Tối ưu lại một chút để vừa vặn theo chiều dọc điện thoại ngắn */
        border-radius: 20px;
        background-color: #eee;
        margin-bottom: 15px;
        object-fit: cover;
        border: 3px solid #ffafc5;
        box-shadow: 0 5px 15px rgba(255, 175, 197, 0.3);
      }

      .heart {
        color: #ff4d6d;
        font-size: 22px;
        margin-bottom: 15px;
        animation: heartbeat 1.5s ease-in-out infinite;
      }

      .dots {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
      }

      .dot {
        width: 14px;
        height: 14px;
        border: 2px solid #ffafc5;
        border-radius: 50%;
        transition: background-color 0.2s ease;
      }

      .keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px 20px; /* Khoảng cách dọc 15px, ngang 20px giúp bấm dễ hơn */
        width: 100%;
        justify-items: center;
      }

      .keypad button {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        background-color: rgba(255, 255, 255, 0.7);
        font-size: 22px;
        font-weight: bold;
        color: #ff4d6d;
        cursor: pointer;
        transition: all 0.1s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        user-select: none; /* Ngăn chặn việc bôi đen text khi bấm nhanh */
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.03);
      }

      /* Hiệu ứng khi ngón tay chạm vào nút trên điện thoại */
      .keypad button:active {
        background-color: #ffc2d1;
        transform: scale(0.92);
      }

      /* Nút xóa (chứa icon SVG) */
      .btn-delete svg {
        width: 24px;
        height: 24px;
      }

      @keyframes heartbeat {
        0%, 30%, 60%, 100% { transform: scale(1); }
        15% { transform: scale(1.2); }
        45% { transform: scale(1.15); }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="src/assets/IMG_PASS.JPG" class="avatar" alt="Avatar" />

      <div class="heart">❤️</div>

      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div
        id="message"
        style="
          height: 20px;
          color: #ff4d6d;
          font-size: 14px;
          margin-bottom: 15px;
          font-weight: bold;
        "
      ></div>

      <div class="keypad">
        <button>1</button><button>2</button><button>3</button>
        <button>4</button><button>5</button><button>6</button>
        <button>7</button><button>8</button><button>9</button>
        <div></div>
        <button>0</button>
        <button class="btn-delete">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9.75 14.25 12m0 0 2.25 2.25M14.25 12l2.25-2.25M14.25 12 12 14.25m-2.58 4.92-6.374-6.375a1.125 1.125 0 0 1 0-1.59L9.42 4.83c.21-.211.497-.33.795-.33H19.5a2.25 2.25 0 0 1 2.25 2.25v10.5a2.25 2.25 0 0 1-2.25 2.25h-9.284c-.298 0-.585-.119-.795-.33Z"
            />
          </svg>
        </button>
      </div>
    </div>

    <script>
      let currentInput = "";
      const correctPin = "0906"; // Mật khẩu của bạn
      const dots = document.querySelectorAll(".dot");

      document.querySelectorAll(".keypad button").forEach((button) => {
        button.addEventListener("click", () => {
          // Check xem nút được bấm có phải nút xóa (class btn-delete) không
          const isDelete = button.classList.contains("btn-delete");
          const value = button.innerText.trim();

          if (isDelete) {
            currentInput = currentInput.slice(0, -1);
          } else if (value !== "") {
            if (currentInput.length < 4) {
              currentInput += value;
            }
          }

          updateDots();

          if (currentInput.length === 4) {
            setTimeout(() => {
              checkPin();
            }, 200);
          }
        });
      });

      function updateDots() {
        dots.forEach((dot, index) => {
          if (index < currentInput.length) {
            dot.style.backgroundColor = "#ff4d6d";
          } else {
            dot.style.backgroundColor = "transparent";
          }
        });
      }

      function checkPin() {
        const msgElement = document.getElementById("message");

        if (currentInput === correctPin) {
         window.location.href="/menu.html";
        } else {
          msgElement.style.color = "#ff4d6d";
          msgElement.innerText = "Sai mật khẩu, thử lại nhé!";

          setTimeout(() => {
            msgElement.innerText = "";
            currentInput = "";
            updateDots();
          }, 2000);
        }
      }
    </script>
  </body>
</html>
